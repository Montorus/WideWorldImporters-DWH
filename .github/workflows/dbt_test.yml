name: Data Pipeline Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DBT_POSTGRES_USER: ${{ secrets.DBT_POSTGRES_USER }}
  DBT_POSTGRES_PASSWORD: ${{ secrets.DBT_POSTGRES_PASSWORD }}
  DBT_POSTGRES_DB: ${{ secrets.DBT_POSTGRES_DB }}
  PYTHONPATH: ${{ github.workspace }}

jobs:
  pipeline-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.DBT_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DBT_POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DBT_POSTGRES_DB }}
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "apache-airflow==3.2.1" \
            "apache-airflow-providers-standard" \
            "apache-airflow-providers-microsoft-mssql==4.5.2" \
            "apache-airflow-providers-postgres" \
            "dbt-postgres" \
            "pandas" \
            "pymssql>=2.3.5"

      - name: Run Airflow DAG import tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Create dbt profiles directory
        run: mkdir -p ~/.dbt

      - name: Create dbt profiles.yml from secrets
        env:
          DBT_POSTGRES_USER: ${{ secrets.DBT_POSTGRES_USER }}
          DBT_POSTGRES_PASSWORD: ${{ secrets.DBT_POSTGRES_PASSWORD }}
          DBT_POSTGRES_DB: ${{ secrets.DBT_POSTGRES_DB }}
        run: |
          cat > ~/.dbt/profiles.yml << EOF
          wideworldimporters_dwh:
            target: dev
            outputs:
              dev:
                type: postgres
                host: 127.0.0.1
                port: 5434
                user: ${DBT_POSTGRES_USER}
                password: ${DBT_POSTGRES_PASSWORD}
                dbname: ${DBT_POSTGRES_DB}
                schema: public
                threads: 4
          EOF

      - name: Parse dbt project
        working-directory: ./dbt
        run: dbt parse

      - name: Initialize DWH schema
        env:
          PGPASSWORD: ${{ secrets.DBT_POSTGRES_PASSWORD }}
          DBT_POSTGRES_USER: ${{ secrets.DBT_POSTGRES_USER }}
          DBT_POSTGRES_DB: ${{ secrets.DBT_POSTGRES_DB }}
        run: psql -h 127.0.0.1 -p 5434 -U "${DBT_POSTGRES_USER}" -d "${DBT_POSTGRES_DB}" -f sql/queries/init_warehouse.sql

      - name: Seed raw test data
        env:
          PGPASSWORD: ${{ secrets.DBT_POSTGRES_PASSWORD }}
          DBT_POSTGRES_USER: ${{ secrets.DBT_POSTGRES_USER }}
          DBT_POSTGRES_DB: ${{ secrets.DBT_POSTGRES_DB }}
        run: |
          psql -h 127.0.0.1 -p 5434 -U "${DBT_POSTGRES_USER}" -d "${DBT_POSTGRES_DB}" -c "
            INSERT INTO raw_customers (
              customerid, personid, storeid, territoryid, accountnumber,
              customer_name, first_name, middle_name, last_name, store_name, modifieddate
            )
            VALUES (1, 1, null, 1, 'AW00000001', 'Test Customer', 'Test', null, 'Customer', null, now());

            INSERT INTO raw_products (
              productid, name, productnumber, makeflag, finishedgoodsflag, color,
              safetystocklevel, reorderpoint, standardcost, listprice, size,
              weight, daystomanufacture, productline, class, style
            )
            VALUES (1, 'Test Product', 'TP-001', true, true, 'Red', 100, 50, 10.00, 20.00, 'M', 1.5, 1, 'R', 'H', 'U');

            INSERT INTO raw_employees (
              businessentityid, nationalidnumber, loginid, jobtitle, birthdate,
              maritalstatus, gender, hiredate, salariedflag, vacationhours,
              sickleavehours, currentflag, rowguid, modifieddate
            )
            VALUES (1, '123', 'test/login', 'Engineer', '1990-01-01', 'S', 'M', '2020-01-01', true, 10, 5, true, 'abc', now());

            INSERT INTO raw_sales_orders (
              salesorderid, revisionnumber, orderdate, duedate, shipdate, status,
              onlineorderflag, purchaseordernumber, accountnumber, customerid,
              salespersonid, territoryid, shipmethodid, subtotal, taxamt, freight,
              totaldue, modifieddate
            )
            VALUES (1, 1, now(), now(), now(), 5, false, 'PO-001', 'ACC-001', 1, 1, 1, 1, 100.00, 10.00, 5.00, 115.00, now());

            INSERT INTO raw_sales_details (
              salesorderid, salesorderdetailid, carriertrackingnumber, orderqty,
              productid, specialofferid, unitprice, unitpricediscount, rowguid, modifieddate
            )
            VALUES (1, 1, 'TRK-001', 2, 1, 1, 20.00, 0.00, 'abc', now());
          "

      - name: Run dbt models
        working-directory: ./dbt
        run: dbt run

      - name: Run dbt tests
        working-directory: ./dbt
        run: dbt test
